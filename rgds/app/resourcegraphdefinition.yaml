apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: apps.platform.connectedcare.io
spec:
  schema:
    apiVersion: v1alpha1
    group: platform.connectedcare.io
    kind: App
    types:
      LocalObjectReference:
        name: string | required=true
      ResourceValues:
        cpu: string
        memory: string
      ResourceRequirements:
        requests: ResourceValues
        limits: ResourceValues
      ObjectFieldSelector:
        apiVersion: string
        fieldPath: string | required=true
      ResourceFieldSelector:
        containerName: string
        resource: string | required=true
      SecretKeySelector:
        name: string | required=true
        key: string | required=true
        optional: boolean
      ConfigMapKeySelector:
        name: string | required=true
        key: string | required=true
        optional: boolean
      EnvVarSource:
        fieldRef: ObjectFieldSelector
        resourceFieldRef: ResourceFieldSelector
        secretKeyRef: SecretKeySelector
        configMapKeyRef: ConfigMapKeySelector
      EnvVar:
        name: string | required=true
        value: string
        valueFrom: EnvVarSource
      Toleration:
        key: string
        operator: string
        value: string
        effect: string
        tolerationSeconds: integer
      TopologySpreadConfig:
        enabled: boolean | default=false
        topologyKey: string | default="kubernetes.io/hostname"
        maxSkew: integer | default=1
        whenUnsatisfiable: string | default="ScheduleAnyway"
      HttpProbeConfig:
        enabled: boolean | default=false
        path: string | default="/"
        initialDelaySeconds: integer | default=0
        periodSeconds: integer | default=10
        timeoutSeconds: integer | default=1
        successThreshold: integer | default=1
        failureThreshold: integer | default=3
      RestrictedSecurityConfig:
        enabled: boolean | default=false
        readOnlyRootFilesystem: boolean | default=false
      DisruptionBudgetConfig:
        enabled: boolean | default=false
        maxUnavailable: string | default="1"
        maxUnavailableCount: integer | default=1
      ServiceMonitorConfig:
        enabled: boolean | default=false
        path: string | default="/metrics"
        interval: string | default="30s"
        scrapeTimeout: string | default="10s"
      PersistentStorageConfig:
        enabled: boolean | default=false
        size: string | default="1Gi"
        mountPath: string | default="/data"
        accessMode: string | default="ReadWriteOnce"
      RuntimeConfig:
        imagePullSecrets: "[]LocalObjectReference"
        imagePullPolicy: string | default="IfNotPresent"
        serviceAccountName: string
        deploymentAnnotations: "map[string]string"
        podAnnotations: "map[string]string"
        nodeSelector: "map[string]string"
        priorityClassName: string
        tolerations: "[]Toleration"
        topologySpread: TopologySpreadConfig
        readinessProbe: HttpProbeConfig
        livenessProbe: HttpProbeConfig
        restrictedSecurity: RestrictedSecurityConfig
        resources: ResourceRequirements
      ServiceConfig:
        type: string | default="ClusterIP"
        annotations: "map[string]string"
    spec:
      name: string | required=true
      namespace: string | required=true
      component: string
      partOf: string
      version: string
      image: string | required=true
      port: integer | default=8080
      replicas: integer | default=1
      dependencies:
        database:
          enabled: boolean | default=false
          databaseClusterName: string
        cache:
          enabled: boolean | default=false
          cacheClusterName: string
      config:
        revision: string
        data: "map[string]string"
        env: "[]EnvVar"
        envFromConfigMaps: "[]LocalObjectReference"
        envFromSecrets: "[]LocalObjectReference"
      runtime: RuntimeConfig
      service: ServiceConfig
      storage: PersistentStorageConfig
      serviceMonitor: ServiceMonitorConfig
      disruptionBudget: DisruptionBudgetConfig
      autoscaling:
        enabled: boolean | default=false
        minReplicas: integer | default=1
        maxReplicas: integer | default=3
        targetCPUUtilizationPercentage: integer | default=80
      route:
        enabled: boolean | default=false
        gatewayName: string
        gatewayNamespace: string
        hostnames: "[]string"
        pathPrefix: string | default="/"
      externalSecret:
        enabled: boolean | default=false
        secretStoreRefName: string
        secretStoreKind: string | default="ClusterSecretStore"
        targetSecretName: string
        refreshInterval: string | default="1h"
        extractKey: string
      certificate:
        enabled: boolean | default=false
        issuerName: string
        issuerKind: string | default="ClusterIssuer"
        secretName: string
        dnsNames: "[]string"
    status:
      serviceName: ${service.metadata.name}
      serviceType: ${service.spec.type}
    additionalPrinterColumns:
      - name: Service
        type: string
        jsonPath: .status.serviceName
      - name: Type
        type: string
        jsonPath: .status.serviceType
      - name: Age
        type: date
        jsonPath: .metadata.creationTimestamp
  resources:
    - id: serviceAccount
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.metadata.name}
            app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
            app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
            app.kubernetes.io/part-of: ${schema.spec.?partOf.orValue("")}
            app.kubernetes.io/managed-by: kro
    - id: configMap
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.metadata.name}
            app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
            app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
            app.kubernetes.io/part-of: ${schema.spec.?partOf.orValue("")}
            app.kubernetes.io/managed-by: kro
        data: ${schema.spec.?config.?data.orValue({})}
    - id: databaseCluster
      includeWhen:
        - ${schema.spec.dependencies.database.enabled}
      externalRef:
        apiVersion: platform.connectedcare.io/v1alpha1
        kind: DatabaseCluster
        metadata:
          name: ${schema.spec.dependencies.database.databaseClusterName}
          namespace: ${schema.spec.namespace}
    - id: cacheCluster
      includeWhen:
        - ${schema.spec.dependencies.cache.enabled}
      externalRef:
        apiVersion: platform.connectedcare.io/v1alpha1
        kind: CacheCluster
        metadata:
          name: ${schema.spec.dependencies.cache.cacheClusterName}
          namespace: ${schema.spec.namespace}
    - id: persistentVolumeClaim
      includeWhen:
        - ${schema.spec.?storage.?enabled.orValue(false)}
      template:
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: ${schema.spec.name}-data
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.metadata.name}
            app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
            app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
            app.kubernetes.io/part-of: ${schema.spec.?partOf.orValue("")}
            app.kubernetes.io/managed-by: kro
        spec:
          accessModes:
            - ${schema.spec.?storage.?accessMode.orValue("ReadWriteOnce")}
          resources:
            requests:
              storage: ${schema.spec.?storage.?size.orValue("1Gi")}
    - id: deployment
      includeWhen:
        - ${!schema.spec.?storage.?enabled.orValue(false)}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.metadata.name}
            app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
            app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
            app.kubernetes.io/part-of: ${schema.spec.?partOf.orValue("")}
            app.kubernetes.io/managed-by: kro
          annotations: ${schema.spec.?runtime.?deploymentAnnotations.orValue({})}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.spec.name}
              app.kubernetes.io/instance: ${schema.metadata.name}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.spec.name}
                app.kubernetes.io/instance: ${schema.metadata.name}
                app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
                app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
                app.kubernetes.io/part-of: ${schema.spec.?partOf.orValue("")}
                app.kubernetes.io/managed-by: kro
                platform.connectedcare.io/config-revision: ${schema.spec.?config.?revision.orValue("")}
              annotations: ${schema.spec.?runtime.?podAnnotations.orValue({})}
            spec:
              serviceAccountName: ${schema.spec.?runtime.?serviceAccountName.orValue(serviceAccount.metadata.name)}
              imagePullSecrets: ${schema.spec.?runtime.?imagePullSecrets.orValue([])}
              nodeSelector: ${schema.spec.?runtime.?nodeSelector.orValue({})}
              priorityClassName: ${schema.spec.?runtime.?priorityClassName.orValue("")}
              tolerations: ${schema.spec.?runtime.?tolerations.orValue([])}
              topologySpreadConstraints: >-
                ${
                  schema.spec.?runtime.?topologySpread.?enabled.orValue(false)
                  ? [{
                      "maxSkew": schema.spec.?runtime.?topologySpread.?maxSkew.orValue(1),
                      "topologyKey": schema.spec.?runtime.?topologySpread.?topologyKey.orValue("kubernetes.io/hostname"),
                      "whenUnsatisfiable": schema.spec.?runtime.?topologySpread.?whenUnsatisfiable.orValue("ScheduleAnyway"),
                      "labelSelector": {
                        "matchLabels": {
                          "app.kubernetes.io/name": schema.spec.name,
                          "app.kubernetes.io/instance": schema.metadata.name
                        }
                      }
                    }]
                  : []
                }
              containers:
                - name: app
                  image: ${schema.spec.image}
                  imagePullPolicy: ${schema.spec.?runtime.?imagePullPolicy.orValue("IfNotPresent")}
                  ports:
                    - containerPort: ${schema.spec.port}
                      name: http
                  env: ${schema.spec.?config.?env.orValue([])}
                  envFrom: >-
                    ${
                      [{"prefix": "", "configMapRef": {"name": configMap.metadata.name, "optional": false}}]
                      + schema.spec.?config.?envFromConfigMaps.orValue([]).map(cm, {"prefix": "", "configMapRef": {"name": cm.name, "optional": false}})
                      + schema.spec.?config.?envFromSecrets.orValue([]).map(secretRef, {"prefix": "", "secretRef": {"name": secretRef.name, "optional": false}})
                    }
                  readinessProbe: >-
                    ${
                      schema.spec.?runtime.?readinessProbe.?enabled.orValue(false)
                      ? {
                          "httpGet": {
                            "path": schema.spec.?runtime.?readinessProbe.?path.orValue("/"),
                            "port": "http"
                          },
                          "initialDelaySeconds": schema.spec.?runtime.?readinessProbe.?initialDelaySeconds.orValue(0),
                          "periodSeconds": schema.spec.?runtime.?readinessProbe.?periodSeconds.orValue(10),
                          "timeoutSeconds": schema.spec.?runtime.?readinessProbe.?timeoutSeconds.orValue(1),
                          "successThreshold": schema.spec.?runtime.?readinessProbe.?successThreshold.orValue(1),
                          "failureThreshold": schema.spec.?runtime.?readinessProbe.?failureThreshold.orValue(3)
                        }
                      : {}
                    }
                  livenessProbe: >-
                    ${
                      schema.spec.?runtime.?livenessProbe.?enabled.orValue(false)
                      ? {
                          "httpGet": {
                            "path": schema.spec.?runtime.?livenessProbe.?path.orValue("/"),
                            "port": "http"
                          },
                          "initialDelaySeconds": schema.spec.?runtime.?livenessProbe.?initialDelaySeconds.orValue(0),
                          "periodSeconds": schema.spec.?runtime.?livenessProbe.?periodSeconds.orValue(10),
                          "timeoutSeconds": schema.spec.?runtime.?livenessProbe.?timeoutSeconds.orValue(1),
                          "successThreshold": schema.spec.?runtime.?livenessProbe.?successThreshold.orValue(1),
                          "failureThreshold": schema.spec.?runtime.?livenessProbe.?failureThreshold.orValue(3)
                        }
                      : {}
                    }
                  securityContext: >-
                    ${
                      schema.spec.?runtime.?restrictedSecurity.?enabled.orValue(false)
                      ? {
                          "allowPrivilegeEscalation": false,
                          "capabilities": {
                            "drop": ["ALL"]
                          },
                          "runAsNonRoot": true,
                          "readOnlyRootFilesystem": schema.spec.?runtime.?restrictedSecurity.?readOnlyRootFilesystem.orValue(false),
                          "seccompProfile": {
                            "type": "RuntimeDefault"
                          }
                        }
                      : {}
                    }
                  resources:
                    requests:
                      cpu: ${schema.spec.?runtime.?resources.?requests.?cpu.orValue("100m")}
                      memory: ${schema.spec.?runtime.?resources.?requests.?memory.orValue("128Mi")}
                    limits:
                      cpu: ${schema.spec.?runtime.?resources.?limits.?cpu.orValue("500m")}
                      memory: ${schema.spec.?runtime.?resources.?limits.?memory.orValue("512Mi")}
    - id: deploymentWithStorage
      includeWhen:
        - ${schema.spec.?storage.?enabled.orValue(false)}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.metadata.name}
            app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
            app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
            app.kubernetes.io/part-of: ${schema.spec.?partOf.orValue("")}
            app.kubernetes.io/managed-by: kro
          annotations: ${schema.spec.?runtime.?deploymentAnnotations.orValue({})}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.spec.name}
              app.kubernetes.io/instance: ${schema.metadata.name}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.spec.name}
                app.kubernetes.io/instance: ${schema.metadata.name}
                app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
                app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
                app.kubernetes.io/part-of: ${schema.spec.?partOf.orValue("")}
                app.kubernetes.io/managed-by: kro
                platform.connectedcare.io/config-revision: ${schema.spec.?config.?revision.orValue("")}
              annotations: ${schema.spec.?runtime.?podAnnotations.orValue({})}
            spec:
              serviceAccountName: ${schema.spec.?runtime.?serviceAccountName.orValue(serviceAccount.metadata.name)}
              imagePullSecrets: ${schema.spec.?runtime.?imagePullSecrets.orValue([])}
              nodeSelector: ${schema.spec.?runtime.?nodeSelector.orValue({})}
              priorityClassName: ${schema.spec.?runtime.?priorityClassName.orValue("")}
              tolerations: ${schema.spec.?runtime.?tolerations.orValue([])}
              topologySpreadConstraints: >-
                ${
                  schema.spec.?runtime.?topologySpread.?enabled.orValue(false)
                  ? [{
                      "maxSkew": schema.spec.?runtime.?topologySpread.?maxSkew.orValue(1),
                      "topologyKey": schema.spec.?runtime.?topologySpread.?topologyKey.orValue("kubernetes.io/hostname"),
                      "whenUnsatisfiable": schema.spec.?runtime.?topologySpread.?whenUnsatisfiable.orValue("ScheduleAnyway"),
                      "labelSelector": {
                        "matchLabels": {
                          "app.kubernetes.io/name": schema.spec.name,
                          "app.kubernetes.io/instance": schema.metadata.name
                        }
                      }
                    }]
                  : []
                }
              volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: ${persistentVolumeClaim.metadata.name}
                    readOnly: false
              containers:
                - name: app
                  image: ${schema.spec.image}
                  imagePullPolicy: ${schema.spec.?runtime.?imagePullPolicy.orValue("IfNotPresent")}
                  ports:
                    - containerPort: ${schema.spec.port}
                      name: http
                  env: ${schema.spec.?config.?env.orValue([])}
                  envFrom: >-
                    ${
                      [{"prefix": "", "configMapRef": {"name": configMap.metadata.name, "optional": false}}]
                      + schema.spec.?config.?envFromConfigMaps.orValue([]).map(cm, {"prefix": "", "configMapRef": {"name": cm.name, "optional": false}})
                      + schema.spec.?config.?envFromSecrets.orValue([]).map(secretRef, {"prefix": "", "secretRef": {"name": secretRef.name, "optional": false}})
                    }
                  readinessProbe: >-
                    ${
                      schema.spec.?runtime.?readinessProbe.?enabled.orValue(false)
                      ? {
                          "httpGet": {
                            "path": schema.spec.?runtime.?readinessProbe.?path.orValue("/"),
                            "port": "http"
                          },
                          "initialDelaySeconds": schema.spec.?runtime.?readinessProbe.?initialDelaySeconds.orValue(0),
                          "periodSeconds": schema.spec.?runtime.?readinessProbe.?periodSeconds.orValue(10),
                          "timeoutSeconds": schema.spec.?runtime.?readinessProbe.?timeoutSeconds.orValue(1),
                          "successThreshold": schema.spec.?runtime.?readinessProbe.?successThreshold.orValue(1),
                          "failureThreshold": schema.spec.?runtime.?readinessProbe.?failureThreshold.orValue(3)
                        }
                      : {}
                    }
                  livenessProbe: >-
                    ${
                      schema.spec.?runtime.?livenessProbe.?enabled.orValue(false)
                      ? {
                          "httpGet": {
                            "path": schema.spec.?runtime.?livenessProbe.?path.orValue("/"),
                            "port": "http"
                          },
                          "initialDelaySeconds": schema.spec.?runtime.?livenessProbe.?initialDelaySeconds.orValue(0),
                          "periodSeconds": schema.spec.?runtime.?livenessProbe.?periodSeconds.orValue(10),
                          "timeoutSeconds": schema.spec.?runtime.?livenessProbe.?timeoutSeconds.orValue(1),
                          "successThreshold": schema.spec.?runtime.?livenessProbe.?successThreshold.orValue(1),
                          "failureThreshold": schema.spec.?runtime.?livenessProbe.?failureThreshold.orValue(3)
                        }
                      : {}
                    }
                  securityContext: >-
                    ${
                      schema.spec.?runtime.?restrictedSecurity.?enabled.orValue(false)
                      ? {
                          "allowPrivilegeEscalation": false,
                          "capabilities": {
                            "drop": ["ALL"]
                          },
                          "runAsNonRoot": true,
                          "readOnlyRootFilesystem": schema.spec.?runtime.?restrictedSecurity.?readOnlyRootFilesystem.orValue(false),
                          "seccompProfile": {
                            "type": "RuntimeDefault"
                          }
                        }
                      : {}
                    }
                  volumeMounts:
                    - name: data
                      mountPath: ${schema.spec.?storage.?mountPath.orValue("/data")}
                      readOnly: false
                  resources:
                    requests:
                      cpu: ${schema.spec.?runtime.?resources.?requests.?cpu.orValue("100m")}
                      memory: ${schema.spec.?runtime.?resources.?requests.?memory.orValue("128Mi")}
                    limits:
                      cpu: ${schema.spec.?runtime.?resources.?limits.?cpu.orValue("500m")}
                      memory: ${schema.spec.?runtime.?resources.?limits.?memory.orValue("512Mi")}
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.metadata.name}
            app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
            app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
            app.kubernetes.io/part-of: ${schema.spec.?partOf.orValue("")}
            app.kubernetes.io/managed-by: kro
          annotations: ${schema.spec.?service.?annotations.orValue({})}
        spec:
          type: ${schema.spec.?service.?type.orValue("ClusterIP")}
          selector:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.metadata.name}
          ports:
            - name: http
              port: ${schema.spec.port}
              targetPort: ${schema.spec.port}
    - id: disruptionBudget
      includeWhen:
        - ${schema.spec.?disruptionBudget.?enabled.orValue(false)}
      template:
        apiVersion: policy/v1
        kind: PodDisruptionBudget
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.metadata.name}
            app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
            app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
            app.kubernetes.io/part-of: ${schema.spec.?partOf.orValue("")}
            app.kubernetes.io/managed-by: kro
        spec:
          maxUnavailable: ${schema.spec.?disruptionBudget.?maxUnavailableCount.orValue(1)}
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.spec.name}
              app.kubernetes.io/instance: ${schema.metadata.name}
    - id: serviceMonitor
      includeWhen:
        - ${schema.spec.?serviceMonitor.?enabled.orValue(false)}
      template:
        apiVersion: monitoring.coreos.com/v1
        kind: ServiceMonitor
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.metadata.name}
            app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
            app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
            app.kubernetes.io/part-of: ${schema.spec.?partOf.orValue("")}
            app.kubernetes.io/managed-by: kro
        spec:
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.spec.name}
              app.kubernetes.io/instance: ${schema.metadata.name}
          endpoints:
            - port: http
              path: ${schema.spec.?serviceMonitor.?path.orValue("/metrics")}
              interval: ${schema.spec.?serviceMonitor.?interval.orValue("30s")}
              scrapeTimeout: ${schema.spec.?serviceMonitor.?scrapeTimeout.orValue("10s")}
    - id: autoscaler
      includeWhen:
        - ${schema.spec.autoscaling.enabled}
      template:
        apiVersion: autoscaling/v2
        kind: HorizontalPodAutoscaler
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.metadata.name}
            app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
            app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
            app.kubernetes.io/part-of: ${schema.spec.?partOf.orValue("")}
            app.kubernetes.io/managed-by: kro
        spec:
          scaleTargetRef:
            apiVersion: apps/v1
            kind: Deployment
            name: ${schema.spec.name}
          minReplicas: ${schema.spec.autoscaling.minReplicas}
          maxReplicas: ${schema.spec.autoscaling.maxReplicas}
          metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: ${schema.spec.autoscaling.targetCPUUtilizationPercentage}
    - id: httpRoute
      includeWhen:
        - ${schema.spec.route.enabled}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.metadata.name}
            app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
            app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
            app.kubernetes.io/part-of: ${schema.spec.?partOf.orValue("")}
            app.kubernetes.io/managed-by: kro
        spec:
          parentRefs:
            - name: ${schema.spec.route.gatewayName}
              namespace: ${schema.spec.route.gatewayNamespace}
          hostnames: ${schema.spec.route.hostnames}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: ${schema.spec.route.pathPrefix}
              backendRefs:
                - name: ${service.metadata.name}
                  port: ${schema.spec.port}
    - id: externalSecret
      includeWhen:
        - ${schema.spec.externalSecret.enabled}
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.metadata.name}
            app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
            app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
            app.kubernetes.io/part-of: ${schema.spec.?partOf.orValue("")}
            app.kubernetes.io/managed-by: kro
        spec:
          refreshInterval: ${schema.spec.externalSecret.refreshInterval}
          secretStoreRef:
            name: ${schema.spec.externalSecret.secretStoreRefName}
            kind: ${schema.spec.externalSecret.secretStoreKind}
          target:
            name: ${schema.spec.externalSecret.targetSecretName}
          dataFrom:
            - extract:
                key: ${schema.spec.externalSecret.extractKey}
    - id: certificate
      includeWhen:
        - ${schema.spec.certificate.enabled}
      template:
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.metadata.name}
            app.kubernetes.io/version: ${schema.spec.?version.orValue("")}
            app.kubernetes.io/component: ${schema.spec.?component.orValue("")}
